<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>ה-CRM שלי</title>
</head>
<body class="p-5 bg-light">
    <div class="container shadow-sm p-4 bg-white rounded">
        <h1 class="mb-4">ניהול לידים</h1>
        <table class="table border">
            <thead class="table-dark">
                <tr><th>שם</th><th>טלפון</th><th>סטטוס</th></tr>
            </thead>
            <tbody>
                {% for lead in leads %}
                <tr>
                    <td>{{ lead[1] }}</td>
                    <td>{{ lead[2] }}</td>
                    <td><span class="badge bg-info text-dark">{{ lead[3] }}</span></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>

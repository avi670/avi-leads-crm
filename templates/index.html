<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת ניהול לידים פרו</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Assistant', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="max-w-7xl mx-auto px-4 py-8 relative">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">ניהול לידים <span class="text-blue-600">Pro</span></h1>
            <button id="openModalBtn" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition flex items-center">
                <i class="fas fa-plus ml-2"></i> ליד חדש
            </button>
        </div>

        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <table class="w-full text-right border-collapse">
                <thead>
                    <tr class="bg-gray-100 text-gray-600 text-sm">
                        <th class="p-4 border-b">שם הלקוח</th>
                        <th class="p-4 border-b">טלפון</th>
                        <th class="p-4 border-b">מקור</th>
                        <th class="p-4 border-b">סטטוס</th>
                        <th class="p-4 border-b">תאריך</th>
                        <th class="p-4 border-b">פעולות</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-200">
                    {% for lead in leads %}
                    <tr class="hover:bg-gray-50 transition">
                        <td class="p-4 font-semibold text-gray-800">{{ lead.name }}</td>
                        <td class="p-4 text-gray-600">{{ lead.phone }}</td>
                        <td class="p-4">
                            <span class="px-2 py-1 bg-gray-200 text-xs rounded-md">{{ lead.source }}</span>
                        </td>
                        <td class="p-4">
                            <span class="px-3 py-1 text-xs font-bold rounded-full bg-blue-100 text-blue-700">
                                {{ lead.status }}
                            </span>
                        </td>
                        <td class="p-4 text-sm text-gray-500">-</td>
                        <td class="p-4 flex gap-2">
                            <a href="https://wa.me/972{{ lead.phone[1:] }}?text=היי {{ lead.name }}" target="_blank" class="text-green-500 hover:text-green-600 text-xl">
                                <i class="fab fa-whatsapp"></i>
                            </a>
                            <a href="tel:{{ lead.phone }}" class="text-blue-500 hover:text-blue-600 text-xl">
                                <i class="fas fa-phone">
                                </i>
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <div id="leadModal" class="fixed inset-0 bg-gray-900 bg-opacity-50 flex justify-center items-center z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg p-8 transform scale-90 transition-transform duration-300">
            
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold flex items-center">
                    <i class="fas fa-plus-circle text-blue-600 ml-3"></i>
                    הקמת ליד פרטי חדש
                </h2>
                <button id="closeModalBtn" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>

            <form action="/add_lead_manual" method="POST" class="space-y-4">
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">שם מלא *</label>
                    <input type="text" name="name" required class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-200 outline-none" placeholder="ישראל ישראלי">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">טלפון *</label>
                    <input type="tel" name="phone" required class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-200 outline-none" placeholder="0500000000">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">גיל</label>
                        <input type="number" name="age" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-200 outline-none" placeholder="35">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">מוצר/שירות</label>
                        <input type="text" name="product" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-200 outline-none" placeholder="לא ידוע">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">מקור ליד</label>
                    <input type="text" name="source" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-200 outline-none" placeholder="המלצה, פייסבוק, וכו'">
                </div>

                <div class="flex justify-end gap-3 pt-6">
                    <button type="button" id="cancelBtn" class="px-6 py-2 border rounded-lg hover:bg-gray-100 transition">ביטול</button>
                    <button type="submit" class="bg-purple-600 text-white px-6 py-2 rounded-lg hover:bg-purple-700 transition font-bold">שמור ליד פרטי</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const modal = document.getElementById('leadModal');
        const modalContent = modal.querySelector('.bg-white');
        const openModalBtn = document.getElementById('openModalBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const cancelBtn = document.getElementById('cancelBtn');

        // פונקציה לפתיחת המודל עם אנימציה
        function openModal() {
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-90');
            }, 10);
        }

        // פונקציה לסגירת המודל
        function closeModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300); // מחכה לסיום האנימציה
        }

        openModalBtn.addEventListener('click', openModal);
        closeModalBtn.addEventListener('click', closeModal);
        cancelBtn.addEventListener('click', closeModal);

        // סגירה בלחיצה על הרקע השקוף
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });
    </script>

</body>
</html>

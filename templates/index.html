<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת ניהול לידים פרו</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Assistant', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">ניהול לידים <span class="text-blue-600">Pro</span></h1>
            <button class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition">
                <i class="fas fa-plus ml-2"></i>ליד חדש
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border-r-4 border-blue-500">
                <p class="text-gray-500 text-sm">סה"כ לידים</p>
                <p class="text-2xl font-bold">{{ stats.total }}</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-r-4 border-green-500">
                <p class="text-gray-500 text-sm">חדשים</p>
                <p class="text-2xl font-bold text-green-600">{{ stats.new }}</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-r-4 border-yellow-500">
                <p class="text-gray-500 text-sm">בטיפול</p>
                <p class="text-2xl font-bold text-yellow-600">{{ stats.in_progress }}</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-r-4 border-purple-500">
                <p class="text-gray-500 text-sm">יחס המרה</p>
                <p class="text-2xl font-bold">0%</p>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <table class="w-full text-right border-collapse">
                <thead>
                    <tr class="bg-gray-100 text-gray-600 text-sm">
                        <th class="p-4 border-b">שם הלקוח</th>
                        <th class="p-4 border-b">טלפון</th>
                        <th class="p-4 border-b">מקור</th>
                        <th class="p-4 border-b">סטטוס</th>
                        <th class="p-4 border-b">תאריך יצירה</th>
                        <th class="p-4 border-b">פעולות</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-200">
                    {% for lead in leads %}
                    <tr class="hover:bg-gray-50 transition">
                        <td class="p-4 font-semibold text-gray-800">{{ lead.name }}</td>
                        <td class="p-4 text-gray-600">{{ lead.phone }}</td>
                        <td class="p-4">
                            <span class="px-2 py-1 bg-gray-200 text-xs rounded-md">{{ lead.source }}</span>
                        </td>
                        <td class="p-4">
                            <span class="px-3 py-1 text-xs font-bold rounded-full 
                                {% if lead.status == 'חדש' %} bg-blue-100 text-blue-700 
                                {% elif lead.status == 'בטיפול' %} bg-yellow-100 text-yellow-700
                                {% else %} bg-green-100 text-green-700 {% endif %}">
                                {{ lead.status }}
                            </span>
                        </td>
                        <td class="p-4 text-sm text-gray-500">{{ lead.created_at }}</td>
                        <td class="p-4 flex gap-2">
                            <a href="https://wa.me/972{{ lead.phone[1:] }}?text=היי {{ lead.name }}, זה אבי" target="_blank" 
                               class="text-green-500 hover:text-green-600 text-xl">
                                <i class="fab fa-whatsapp"></i>
                            </a>
                            <a href="tel:{{ lead.phone }}" class="text-blue-500 hover:text-blue-600 text-xl">
                                <i class="fas fa-phone"></i>
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>

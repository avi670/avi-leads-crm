<div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
    <div>
        <h1 class="text-4xl font-black text-slate-800">Lead<span class="text-blue-600">Pro</span></h1>
        <p class="text-slate-500 font-medium">ניהול קמפיינים ולידים בזמן אמת</p>
    </div>
    
    <div class="flex w-full md:w-auto gap-2">
        <form action="/" method="GET" class="flex gap-2 flex-1 md:w-96">
            <div class="relative flex-1">
                <input type="text" name="search" value="{{ search_query }}" placeholder="חפש שם, טלפון או קמפיין..." 
                       class="w-full pl-10 pr-4 py-3 rounded-2xl border-none shadow-sm focus:ring-2 focus:ring-blue-500 outline-none">
                <i class="fas fa-search absolute left-3 top-3.5 text-slate-400"></i>
            </div>
            <button type="submit" class="bg-slate-800 text-white px-4 py-3 rounded-2xl font-bold hover:bg-slate-700 transition">
                חפש
            </button>
            {% if search_query %}
            <a href="/" class="bg-slate-200 text-slate-600 px-4 py-3 rounded-2xl font-bold hover:bg-slate-300 transition">
                נקה
            </a>
            {% endif %}
        </form>
        
        <button onclick="openModal()" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition whitespace-nowrap">
            + ליד חדש
        </button>
    </div>
</div>

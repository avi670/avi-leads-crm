<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadPro CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Assistant', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen pb-10">

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 tracking-tight">Lead<span class="text-blue-600">Pro</span></h1>
            <button onclick="openModal()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-700 shadow-lg transition flex items-center">
                <i class="fas fa-plus ml-2"></i> ליד חדש
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-blue-500 text-center">
                <p class="text-gray-500 text-xs font-bold uppercase">סה"כ לידים</p>
                <p class="text-3xl font-black mt-1">{{ stats.total }}</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-green-400 text-center">
                <p class="text-gray-500 text-xs font-bold uppercase">חדשים</p>
                <p class="text-3xl font-black text-green-500 mt-1">{{ stats.new }}</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-orange-400 text-center">
                <p class="text-gray-500 text-xs font-bold uppercase">נקבעה פגישה</p>
                <p class="text-3xl font-black text-orange-500 mt-1">{{ stats.meetings }}</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-purple-500 text-center">
                <p class="text-gray-500 text-xs font-bold uppercase">נסגרו</p>
                <p class="text-3xl font-black text-purple-600 mt-1">{{ stats.closed }}</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-indigo-600 text-center">
                <p class="text-gray-500 text-xs font-bold uppercase">אחוז המרה</p>
                <p class="text-3xl font-black text-indigo-600 mt-1">{{ stats.conv_rate }}%</p>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
            <table class="w-full text-right border-collapse">
                <thead class="bg-gray-50 text-gray-400 text-xs font-bold uppercase tracking-wider">
                    <tr>
                        <th class="p-5">שם לקוח</th>
                        <th class="p-5">טלפון</th>
                        <th class="p-5">מקור</th>
                        <th class="p-5 text-center">סטטוס</th>
                        <th class="p-5 text-center">פעולות</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    {% for lead in leads %}
                    <tr class="hover:bg-blue-50/30 transition">
                        <td class="p-5 font-bold text-gray-800">{{ lead.name }}</td>
                        <td class="p-5 text-gray-600 font-medium">{{ lead.phone }}</td>
                        <td class="p-5"><span class="bg-gray-100 text-gray-500 px-3 py-1 rounded-lg text-xs font-bold">{{ lead.source }}</span></td>
                        <td class="p-5 text-center">
                            <select onchange="updateStatus('{{ lead.id }}', this.value)" 
                                    class="text-xs font-bold rounded-full px-4 py-2 outline-none cursor-pointer border-none
                                    {% if lead.status == 'חדש' %} bg-green-100 text-green-700
                                    {% elif lead.status == 'נקבעה פגישה' %} bg-orange-100 text-orange-700
                                    {% elif lead.status == 'נסגר' %} bg-purple-100 text-purple-700
                                    {% else %} bg-gray-100 text-gray-700 {% endif %}">
                                <option value="חדש" {% if lead.status == 'חדש' %}selected{% endif %}>חדש</option>
                                <option value="אין מענה" {% if lead.status == 'אין מענה' %}selected{% endif %}>אין מענה</option>
                                <option value="לא מעוניין" {% if lead.status == 'לא מעוניין' %}selected{% endif %}>לא מעוניין</option>
                                <option value="נקבעה פגישה" {% if lead.status == 'נקבעה פגישה' %}selected{% endif %}>נקבעה פגישה</option>
                                <option value="נסגר" {% if lead.status == 'נסגר' %}selected{% endif %}>נסגר</option>
                                <option value="לא נסגר" {% if lead.status == 'לא נסגר' %}selected{% endif %}>לא נסגר</option>
                            </select>
                        </td>
                        <td class="p-5 flex justify-center gap-4">
                            <a href="https://wa.me/972{{ lead.phone[1:] }}?text=היי {{ lead.name }}" target="_blank" class="text-green-500 hover:scale-125 transition text-xl"><i class="fab fa-whatsapp"></i></a>
                            <a href="tel:{{ lead.phone }}" class="text-blue-500 hover:scale-125 transition text-xl"><i class="fas fa-phone"></i></a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <div id="leadModal" class="fixed inset-0 bg-black/60 hidden flex justify-center items-center z-50">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl mx-4">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">+ הקמת ליד חדש</h2>
            <form action="/add_lead_manual" method="POST" class="space-y-4">
                <input type="text" name="name" placeholder="שם מלא" required class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="tel" name="phone" placeholder="טלפון" required class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" name="source" placeholder="מקור (המלצה, פייסבוק...)" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <div class="flex gap-2 pt-4">
                    <button type="submit" class="flex-1 bg-blue-600 text-white p-4 rounded-2xl font-bold">שמור ליד</button>
                    <button type="button" onclick="closeModal()" class="px-6 border rounded-2xl font-bold">ביטול</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById('leadModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('leadModal').classList.add('hidden'); }
        
        async function updateStatus(id, newStatus) {
            await fetch('/update_status', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: id, status: newStatus})
            });
            location.reload(); // רענון כדי לעדכן את הסטטיסטיקה למעלה
        }
    </script>
</body>
</html>
